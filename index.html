<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 视觉对话助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #messageList::-webkit-scrollbar { width: 4px; }
    #messageList::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
    .msg-bubble { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-lg flex flex-col gap-3" style="max-height: 100vh;">

    <h1 class="text-xl font-bold text-white text-center">🤖 AI 视觉对话助手</h1>

    <!-- Camera -->
    <div class="relative w-full bg-gray-900 rounded-xl overflow-hidden border border-gray-700 shrink-0" style="aspect-ratio: 4/3; max-height: 360px;">
      <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas" width="640" height="480" class="hidden"></canvas>

    <!-- Message List -->
    <div id="messageList" class="flex-1 overflow-y-auto space-y-2 min-h-[100px] max-h-[260px] bg-gray-900/50 rounded-xl p-3 border border-gray-700/50">
      <p id="emptyHint" class="text-gray-500 text-xs text-center py-6">按住下方按钮开始对话</p>
    </div>

    <!-- Talk Button -->
    <button id="talkBtn" class="w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white cursor-pointer shrink-0">
      🎤 按住说话
    </button>

    <p id="hint" class="text-xs text-gray-500 text-center">提示：请使用 Chrome 浏览器</p>

  </div>

  <!-- Lightbox overlay -->
  <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 hidden flex-col items-center justify-center cursor-pointer" onclick="closeLightbox()">
    <img id="lightboxImg" class="max-w-[95vw] max-h-[95vh] object-contain rounded-lg shadow-2xl" src="" alt="原图" />
    <p class="text-gray-400 text-xs mt-3">点击任意处或按 Esc 关闭</p>
  </div>

  <script>
  let stream = null;
  let isProcessing = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let currentAudio = null;
  let conversationHistory = [];   // { role:'user'|'assistant', text, frame? }

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const messageList = document.getElementById('messageList');
  const emptyHint = document.getElementById('emptyHint');
  const talkBtn = document.getElementById('talkBtn');
  const hint = document.getElementById('hint');

  function setButtonState(state) {
    const states = {
      idle:    { text: '🎤 按住说话', cls: 'bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white' },
      recording: { text: '🔴 录音中...松开发送', cls: 'bg-red-600 hover:bg-red-500 active:bg-red-700 text-white' },
      sending: { text: '⏳ AI 思考中...', cls: 'bg-gray-600 text-gray-300 cursor-not-allowed' },
      speaking: { text: '🔊 AI 回复中...（点击打断）', cls: 'bg-green-600 hover:bg-green-500 active:bg-green-700 text-white cursor-pointer' },
    };
    const s = states[state];
    talkBtn.textContent = s.text;
    talkBtn.className = 'w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 ' + s.cls;
  }

  function resetToIdle() { isProcessing = false; setButtonState('idle'); }

  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function escapeAttr(str) { return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

  // ─── 缩略图放大 ───
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.remove('hidden');
    lightbox.classList.add('flex');
  }

  function closeLightbox() {
    lightbox.classList.add('hidden');
    lightbox.classList.remove('flex');
    lightboxImg.src = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
      closeLightbox();
    }
  });

  // ─── 消息列表渲染 ───
  function renderMessages() {
    messageList.querySelectorAll('.msg-bubble').forEach(el => el.remove());
    if (conversationHistory.length === 0) {
      emptyHint.classList.remove('hidden');
    } else {
      emptyHint.classList.add('hidden');
      for (const msg of conversationHistory) {
        appendBubble(msg.role, msg.text, msg.frame);
      }
    }
    messageList.scrollTop = messageList.scrollHeight;
  }

  function appendBubble(role, text, frame) {
    emptyHint.classList.add('hidden');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-bubble flex ' + (role === 'user' ? 'justify-end' : 'justify-start');

    if (role === 'user') {
      wrapper.innerHTML =
        `<div class="max-w-[80%] bg-blue-600 rounded-xl px-3 py-2">` +
          (frame ? `<img src="${escapeAttr(frame)}" class="w-16 h-12 object-cover rounded-lg mb-1.5 cursor-pointer hover:opacity-80 transition-opacity" onclick="event.stopPropagation();openLightbox(this.src);" title="点击查看原图" />` : '') +
          `<p class="text-white text-sm whitespace-pre-wrap">${escapeHtml(text)}</p>` +
        `</div>`;
    } else if (role === 'assistant') {
      wrapper.innerHTML =
        `<div class="max-w-[80%] bg-gray-700 rounded-xl px-3 py-2">` +
          `<p class="text-gray-100 text-sm whitespace-pre-wrap">${escapeHtml(text)}</p>` +
        `</div>`;
    }
    messageList.appendChild(wrapper);
    messageList.scrollTop = messageList.scrollHeight;
  }

  function showErrorBubble(msg) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-bubble flex justify-center';
    wrapper.innerHTML = `<div class="max-w-[85%] bg-red-900/50 border border-red-700/50 rounded-xl px-3 py-2"><p class="text-red-300 text-xs">${escapeHtml(msg)}</p></div>`;
    messageList.appendChild(wrapper);
    messageList.scrollTop = messageList.scrollHeight;
    setTimeout(() => { if (wrapper.parentNode) wrapper.remove(); }, 3500);
  }

  // ─── 历史管理 ───
  function addToHistory(role, text, frame) {
    conversationHistory.push({ role, text, ...(frame ? { frame } : {}) });
    // 保持 ≤ 3 轮（6 条）
    while (conversationHistory.length > 6) conversationHistory.shift();
  }

  // 构建发给 API 的 history：仅最近 1 轮 user 保留 frame
  function buildApiHistory() {
    const apiHistory = conversationHistory.map(m => ({ ...m }));
    let foundLastUser = false;
    for (let i = apiHistory.length - 1; i >= 0; i--) {
      if (apiHistory[i].role === 'user') {
        if (!foundLastUser) { foundLastUser = true; }
        else { apiHistory[i].frame = null; }
      }
    }
    return apiHistory;
  }

  // ─── TTS 播放 ───
  function playAudio(audioBase64) {
    if (!audioBase64) return;
    setButtonState('speaking');
    currentAudio = new Audio('data:audio/mp3;base64,' + audioBase64);
    currentAudio.onended = () => { currentAudio = null; resetToIdle(); };
    currentAudio.onerror = () => { currentAudio = null; resetToIdle(); };
    currentAudio.play().catch(() => { currentAudio = null; resetToIdle(); });
  }

  // ─── 页面加载 ───
  async function init() {
    console.log('[init] 页面加载');
    if (!navigator.mediaDevices?.getUserMedia) {
      hint.textContent = '⚠️ 请使用 Chrome 浏览器'; hint.className = 'text-xs text-red-400';
      talkBtn.disabled = true; return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: true });
      console.log('[init] getUserMedia 成功, 音频轨道:', stream.getAudioTracks().length);
      stream.getAudioTracks().forEach((t, i) => console.log(`[init]  音频#${i}: "${t.label}" readyState=${t.readyState}`));
      video.srcObject = stream;
      hint.textContent = '提示：请使用 Chrome 浏览器'; hint.className = 'text-xs text-gray-500';
    } catch (err) {
      console.error('[init] getUserMedia 失败:', err.message);
      hint.textContent = '⚠️ 需要摄像头和麦克风权限'; hint.className = 'text-xs text-red-400';
      talkBtn.disabled = true; return;
    }
    talkBtn.addEventListener('mousedown', onButtonDown);
    talkBtn.addEventListener('mouseup', onButtonUp);
    talkBtn.addEventListener('mouseleave', onButtonUp);
    talkBtn.addEventListener('touchstart', onButtonDown, { passive: false });
    talkBtn.addEventListener('touchend', onButtonUp);
    console.log('[init] 就绪');
  }

  // ─── 按下（含打断逻辑） ───
  function onButtonDown(e) {
    e.preventDefault();

    // 打断：正在播放 TTS 时，停止播放，不进入录音（必须在 isProcessing 之前）
    if (currentAudio && !currentAudio.paused) {
      currentAudio.pause();
      currentAudio = null;
      resetToIdle();
      console.log('[tts] 用户打断播放');
      return;
    }

    if (isProcessing || !stream) return;
    isProcessing = true;
    setButtonState('recording');
    audioChunks = [];

    const audioTrack = stream.getAudioTracks()[0];
    if (!audioTrack) { showErrorBubble('未检测到麦克风'); resetToIdle(); return; }
    const audioStream = new MediaStream([audioTrack]);

    try {
      mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
    } catch (err) {
      mediaRecorder = new MediaRecorder(audioStream);
    }
    console.log('[rec] MediaRecorder started, mimeType:', mediaRecorder.mimeType);

    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onerror = function(e) { console.error('[rec] error:', e.error); showErrorBubble('录音出错'); resetToIdle(); };

    mediaRecorder.onstop = async function() {
      const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      console.log('[rec] stopped, blob size:', audioBlob.size, 'chunks:', audioChunks.length);

      if (audioBlob.size < 1000) { showErrorBubble('未检测到语音，请重试'); resetToIdle(); return; }

      // ── 转换 webm → PCM 16kHz mono → base64 ──
      let audioBase64;
      try {
        console.log('[conv] 开始音频转换...');
        const result = await webmToPcmBase64(audioBlob);
        audioBase64 = result.base64;
        console.log('[conv] 转换完成, base64:', audioBase64.length);
      } catch (err) {
        console.error('[conv] 转换失败:', err.message);
        showErrorBubble('音频处理失败，请重试');
        resetToIdle();
        return;
      }

      // 抓帧
      ctx.drawImage(video, 0, 0, 640, 480);
      const frame = canvas.toDataURL('image/jpeg', 0.6);
      console.log('[frame] captured, length:', frame.length);

      await sendToAI(audioBase64, frame);
    };

    mediaRecorder.start();
  }

  // ─── 松开 ───
  function onButtonUp(e) {
    e.preventDefault();
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
    try { mediaRecorder.stop(); } catch (err) {}
  }

  // ─── webm blob → PCM Int16 16kHz mono → base64 ───
  async function webmToPcmBase64(blob) {
    const arrayBuffer = await blob.arrayBuffer();

    const audioCtx = new AudioContext();
    try {
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      console.log('[conv] decoded: sampleRate=', audioBuffer.sampleRate, 'channels=', audioBuffer.numberOfChannels, 'duration=', audioBuffer.duration);

      const targetRate = 16000;
      const offlineCtx = new OfflineAudioContext(1, Math.ceil(targetRate * audioBuffer.duration), targetRate);
      const source = offlineCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(offlineCtx.destination);
      source.start(0);
      const resampled = await offlineCtx.startRendering();

      const floatData = resampled.getChannelData(0);
      const pcm = new Int16Array(floatData.length);
      for (let i = 0; i < floatData.length; i++) {
        pcm[i] = Math.max(-32768, Math.min(32767, floatData[i] * 32768));
      }

      const bytes = new Uint8Array(pcm.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const base64 = btoa(binary);

      return { base64, byteLen: pcm.byteLength };
    } finally {
      audioCtx.close();
    }
  }

  // ─── 发送 JSON（含 history） ───
  async function sendToAI(audioBase64, frame) {
    setButtonState('sending');
    const t0 = Date.now();

    // 构建 API history（视觉记忆规则：仅最近 1 轮带帧）
    const apiHistory = buildApiHistory();
    console.log('[api] POST JSON, audio:', audioBase64.length, 'chars, frame:', frame.length, 'chars, history:', apiHistory.length, 'msgs');

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audio: audioBase64, frame, history: apiHistory }),
      });
      const elapsed = Date.now() - t0;
      const data = await resp.json();
      console.log('[api] status:', resp.status, 'elapsed:', elapsed, 'ms, text:', data.text?.slice(0, 80), 'audio:', data.audio ? `${data.audio.length} chars` : 'null', 'error:', data.error);

      if (!resp.ok || data.error) {
        showErrorBubble(data.error || '请求失败');
        resetToIdle();
        return;
      }

      if (data.text && data.userText) {
        // 成功轮次加入历史
        addToHistory('user', data.userText, frame);
        addToHistory('assistant', data.text);
        // 渲染本轮对话气泡
        appendBubble('user', data.userText, frame);
        appendBubble('assistant', data.text);
        if (data.audio) { playAudio(data.audio); } else { resetToIdle(); }
      } else if (data.text) {
        addToHistory('assistant', data.text);
        appendBubble('assistant', data.text);
        if (data.audio) { playAudio(data.audio); } else { resetToIdle(); }
      } else {
        resetToIdle();
      }
    } catch (err) {
      console.error('[api] 网络错误:', err.message);
      showErrorBubble('网络错误，请检查连接');
      resetToIdle();
    }
  }

  init();
  </script>
</body>
</html>

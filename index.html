<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 视觉对话助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-lg flex flex-col items-center gap-4">

    <h1 class="text-2xl font-bold text-white">🤖 AI 视觉对话助手</h1>

    <div class="relative w-full bg-gray-900 rounded-xl overflow-hidden border border-gray-700" style="aspect-ratio: 4/3; max-height: 480px;">
      <video
        id="video"
        class="w-full h-full object-cover"
        autoplay
        playsinline
        muted
      ></video>
    </div>

    <canvas id="canvas" width="640" height="480" class="hidden"></canvas>

    <div
      id="replyArea"
      class="w-full min-h-[80px] bg-gray-900 border border-gray-700 rounded-xl p-4 text-gray-300 text-sm leading-relaxed hidden"
    ></div>

    <button
      id="talkBtn"
      class="w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white cursor-pointer"
    >
      🎤 按住说话
    </button>

    <p id="hint" class="text-xs text-gray-500">提示：请使用 Chrome 浏览器</p>

  </div>

  <script>
  // ─── 常量 ───
  const ASR_WS_URL = 'wss://dashscope.aliyuncs.com/api-ws/v1/realtime?model=qwen-asr-realtime';
  const API_KEY = 'sk-ws-H.REDEPRI.HrBc.MEUCIQDf04hQShmOFu8HvVUO1Rd1NJrUTXAhU0rUn9vseLwhIgIgIFtT0vDO5-_fqpjqP9y2H2OdyzFD1pKfexUk7iS4Sog';

  // ─── 全局状态 ───
  let stream = null;
  let isProcessing = false;
  let audioContext = null;
  let processor = null;
  let websocket = null;
  let finalText = null;
  let wsReady = false;
  let silenceTimer = null;

  // ─── DOM 引用 ───
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const replyArea = document.getElementById('replyArea');
  const talkBtn = document.getElementById('talkBtn');
  const hint = document.getElementById('hint');

  // ─── 按钮状态 ───
  function setButtonState(state) {
    const states = {
      idle:    { text: '🎤 按住说话', cls: 'bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white' },
      recording: { text: '🔴 录音中...松开发送', cls: 'bg-red-600 hover:bg-red-500 active:bg-red-700 text-white' },
      sending: { text: '⏳ AI 思考中...', cls: 'bg-gray-600 text-gray-300 cursor-not-allowed' },
    };
    const s = states[state];
    talkBtn.textContent = s.text;
    talkBtn.className = 'w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 ' + s.cls;
  }

  // ─── 显示错误（红色，3秒消失） ───
  function showError(msg) {
    replyArea.classList.remove('hidden');
    replyArea.innerHTML = '<span class="text-red-400">' + escapeHtml(msg) + '</span>';
    setTimeout(() => {
      if (replyArea.querySelector('.text-red-400')) {
        replyArea.classList.add('hidden');
        replyArea.innerHTML = '';
      }
    }, 3000);
  }

  function showReply(text) {
    replyArea.classList.remove('hidden');
    replyArea.innerHTML = '<p class="text-white whitespace-pre-wrap">' + escapeHtml(text) + '</p>';
  }

  function resetToIdle() {
    isProcessing = false;
    setButtonState('idle');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ─── 页面加载 ───
  async function init() {
    if (!navigator.mediaDevices?.getUserMedia) {
      hint.textContent = '⚠️ 请使用 Chrome 浏览器（不支持摄像头访问）';
      hint.className = 'text-xs text-red-400';
      talkBtn.disabled = true;
      talkBtn.className = 'w-full py-4 rounded-xl text-lg font-semibold bg-gray-700 text-gray-500 cursor-not-allowed';
      return;
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 },
        audio: true,
      });
      video.srcObject = stream;
      hint.textContent = '提示：请使用 Chrome 浏览器';
      hint.className = 'text-xs text-gray-500';
    } catch (err) {
      hint.textContent = '⚠️ 需要摄像头和麦克风权限，请在浏览器设置中开启';
      hint.className = 'text-xs text-red-400';
      talkBtn.disabled = true;
      talkBtn.className = 'w-full py-4 rounded-xl text-lg font-semibold bg-gray-700 text-gray-500 cursor-not-allowed';
      return;
    }

    talkBtn.addEventListener('mousedown', onButtonDown);
    talkBtn.addEventListener('mouseup', onButtonUp);
    talkBtn.addEventListener('mouseleave', onButtonUp);
    talkBtn.addEventListener('touchstart', onButtonDown, { passive: false });
    talkBtn.addEventListener('touchend', onButtonUp);
  }

  // ─── 按钮按下：建立 AudioContext + WebSocket ───
  function onButtonDown(e) {
    e.preventDefault();

    if (isProcessing) return;
    if (!stream) return;

    isProcessing = true;
    finalText = null;
    setButtonState('recording');

    // AudioContext — 必须 16000Hz
    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(stream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);

    // WebSocket 连接 ASR（带 token 鉴权）
    const wsUrl = ASR_WS_URL + '&token=' + encodeURIComponent(API_KEY);
    websocket = new WebSocket(wsUrl);
    websocket.binaryType = 'arraybuffer';

    websocket.onopen = function() {
      // 配置服务端 VAD
      websocket.send(JSON.stringify({
        type: 'session.update',
        session: { turn_detection: { type: 'server_vad' } }
      }));
      wsReady = true;
    };

    websocket.onmessage = function(event) {
      const msg = JSON.parse(event.data);
      if (msg.type === 'transcription.completed' && msg.transcription?.text) {
        finalText = msg.transcription.text;
      }
      if (msg.type === 'session.finished') {
        finish();
      }
    };

    websocket.onerror = function() {
      cleanupAudio();
      showError('语音识别连接失败');
      resetToIdle();
    };

    // 音频处理：Float32 → Int16 PCM → WebSocket 发送
    processor.onaudioprocess = function(e) {
      if (!wsReady) return;
      const input = e.inputBuffer.getChannelData(0);
      const pcm = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        pcm[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
      }
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(pcm.buffer);
      }
    };

    source.connect(processor);

    // ScriptProcessor 必须 connect 到 destination 才触发 onaudioprocess
    // 通过 GainNode 静音避免回声
    const gainNode = audioContext.createGain();
    gainNode.gain.value = 0;
    processor.connect(gainNode);
    gainNode.connect(audioContext.destination);

    // 15 秒超时保护
    silenceTimer = setTimeout(() => {
      cleanupAudio();
      showError('识别超时，请重试');
      resetToIdle();
    }, 15000);
  }

  // ─── 按钮松开：提交音频缓冲区 ───
  function onButtonUp(e) {
    e.preventDefault();

    if (!websocket || websocket.readyState !== WebSocket.OPEN) return;

    try {
      websocket.send(JSON.stringify({ type: 'input_audio_buffer.commit' }));
    } catch (err) {
      // WebSocket 可能已关闭，忽略
    }

    setButtonState('sending');
  }

  // ─── 识别完成：检查文字 → 抓帧 → 发送 ───
  function finish() {
    clearTimeout(silenceTimer);
    cleanupAudio();

    if (finalText && finalText.trim()) {
      console.log('识别文字:', finalText);
      sendToAI(finalText);
    } else {
      showError('未检测到语音，请重试');
      resetToIdle();
    }
  }

  // ─── 清理音频资源 ───
  function cleanupAudio() {
    if (processor) { processor.disconnect(); processor = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (websocket) { websocket.close(); websocket = null; }
    wsReady = false;
  }

  // ─── 抓帧 + 发送 JSON 到后端 ───
  async function sendToAI(text) {
    ctx.drawImage(video, 0, 0, 640, 480);
    const frame = canvas.toDataURL('image/jpeg', 0.6);

    console.log('frame 前50字符:', frame.slice(0, 50));

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ frame, text }),
      });

      const data = await resp.json();

      if (resp.ok && data.text) {
        showReply(data.text);
      } else {
        showError(data.error || '请求失败');
      }
    } catch (err) {
      showError('网络错误，请检查连接');
    }

    resetToIdle();
  }

  // ─── 启动 ───
  init();
  </script>

</body>
</html>

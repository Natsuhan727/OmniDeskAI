<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 视觉对话助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-lg flex flex-col gap-3" style="max-height: 100vh;">

    <h1 class="text-xl font-bold text-white text-center">🤖 AI 视觉对话助手</h1>

    <!-- Camera -->
    <div class="relative w-full bg-gray-900 rounded-xl overflow-hidden border border-gray-700 shrink-0" style="aspect-ratio: 4/3; max-height: 360px;">
      <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas" width="640" height="480" class="hidden"></canvas>

    <!-- Monitor Toggle -->
    <button id="monitorToggle" class="w-full py-2 rounded-lg text-sm font-medium select-none bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">▶ 开启实时监测</button>

    <!-- Message List -->
    <div id="messageList" class="flex-1 overflow-y-auto space-y-2 min-h-[100px] max-h-[260px] bg-gray-900/50 rounded-xl p-3 border border-gray-700/50">
      <div id="emptyHint" class="text-gray-500 text-xs text-center py-6 space-y-2">
        <p>👋 首次使用？</p>
        <p>1️⃣ 展开底部 ⚙️ 设置，填入 API Key</p>
        <p>2️⃣ 允许摄像头和麦克风权限</p>
        <p>3️⃣ 按住下方按钮开始对话</p>
      </div>
    </div>

    <!-- Talk Button -->
    <button id="talkBtn" class="w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white cursor-pointer shrink-0">
      🎤 按住说话
    </button>

    <p id="hint" class="text-xs text-gray-500 text-center">提示：请使用 Chrome 浏览器</p>

  </div>

  <!-- Lightbox overlay -->
  <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 hidden flex-col items-center justify-center cursor-pointer">
    <img id="lightboxImg" class="max-w-[95vw] max-h-[95vh] object-contain rounded-lg shadow-2xl" src="" alt="原图" />
    <p class="text-gray-400 text-xs mt-3">点击任意处或按 Esc 关闭</p>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="w-full max-w-lg bg-gray-900/50 border border-gray-700/50 rounded-xl overflow-hidden shrink-0">
    <button id="settingsToggle" class="w-full flex items-center justify-between px-4 py-2 text-gray-400 hover:text-white transition-colors text-sm">
      <span>⚙️ 设置</span>
      <span class="arrow">▲</span>
    </button>
    <div id="settingsBody" class="px-4 pb-3 space-y-4 text-sm hidden">
      <div id="settingsGuide" class="text-gray-500 text-xs text-center hidden"></div>

      <!-- Tab buttons -->
      <div class="flex border-b border-gray-700/50 mb-2">
        <button class="settings-tab active px-3 py-1 text-xs rounded-t border border-b-0 border-gray-700/50 bg-gray-800 text-white" data-tab="providers">🔑 服务</button>
        <button class="settings-tab px-3 py-1 text-xs rounded-t border border-b-0 border-transparent text-gray-500 hover:text-gray-300" data-tab="memory">🧠 AI 记忆</button>
      </div>

      <!-- Providers Tab -->
      <div id="providersTab" class="space-y-4">
        <div id="asrSection" class="bg-gray-800/50 rounded-lg p-3 space-y-2"></div>
        <div id="llmSection" class="bg-gray-800/50 rounded-lg p-3 space-y-2"></div>
        <div id="ttsSection" class="bg-gray-800/50 rounded-lg p-3 space-y-2"></div>

        <div class="flex items-center justify-between">
          <span class="text-gray-400 text-xs">TTS 语音</span>
          <input type="checkbox" id="settingTTS" class="w-4 h-4 accent-green-500" />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-400 text-xs">帧质量</span>
          <div class="flex items-center gap-2">
            <input type="range" id="settingQuality" min="0.4" max="0.8" step="0.2" class="w-20 h-1 accent-blue-500" />
            <span id="settingQualityLabel" class="text-gray-300 w-10 text-right text-xs">60%</span>
          </div>
        </div>

        <button id="saveSettings" class="w-full py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-white text-xs transition-colors">保存设置</button>
      </div>

      <!-- Memory Tab -->
      <div id="memoryTab" class="hidden space-y-3">
        <div class="bg-gray-800/50 rounded-lg p-3 space-y-2">
          <p class="text-gray-500 text-xs font-medium">🧠 自定义 System Prompt</p>
          <p class="text-gray-600 text-xs">在此输入的文字会附加到每次对话的 System Prompt 中，让 AI 更了解你。</p>
          <textarea id="mem_prompt" rows="6" placeholder="例如：&#10;我是张三，清华大一学生，智能测控专业。&#10;请用简洁的语言回答，一句话即可，口语化。&#10;我经常用这个助手看电子元件和电路板。" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm resize-y"></textarea>
        </div>
        <button id="saveMemory" class="w-full py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-white text-xs transition-colors">保存记忆</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>

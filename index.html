<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 视觉对话助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-lg flex flex-col gap-3" style="max-height: 100vh;">

    <h1 class="text-xl font-bold text-white text-center">🤖 AI 视觉对话助手</h1>

    <!-- Camera -->
    <div class="relative w-full bg-gray-900 rounded-xl overflow-hidden border border-gray-700 shrink-0" style="aspect-ratio: 4/3; max-height: 360px;">
      <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas" width="640" height="480" class="hidden"></canvas>

    <!-- Message List -->
    <div id="messageList" class="flex-1 overflow-y-auto space-y-2 min-h-[100px] max-h-[260px] bg-gray-900/50 rounded-xl p-3 border border-gray-700/50">
      <div id="emptyHint" class="text-gray-500 text-xs text-center py-6 space-y-2">
        <p>👋 首次使用？</p>
        <p>1️⃣ 展开底部 ⚙️ 设置，填入 API Key</p>
        <p>2️⃣ 允许摄像头和麦克风权限</p>
        <p>3️⃣ 按住下方按钮开始对话</p>
      </div>
    </div>

    <!-- Talk Button -->
    <button id="talkBtn" class="w-full py-4 rounded-xl text-lg font-semibold select-none transition-colors duration-200 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white cursor-pointer shrink-0">
      🎤 按住说话
    </button>

    <p id="hint" class="text-xs text-gray-500 text-center">提示：请使用 Chrome 浏览器</p>

  </div>

  <!-- Lightbox overlay -->
  <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 hidden flex-col items-center justify-center cursor-pointer">
    <img id="lightboxImg" class="max-w-[95vw] max-h-[95vh] object-contain rounded-lg shadow-2xl" src="" alt="原图" />
    <p class="text-gray-400 text-xs mt-3">点击任意处或按 Esc 关闭</p>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="w-full max-w-lg bg-gray-900/50 border border-gray-700/50 rounded-xl overflow-hidden shrink-0">
    <button id="settingsToggle" class="w-full flex items-center justify-between px-4 py-2 text-gray-400 hover:text-white transition-colors text-sm">
      <span>⚙️ 设置</span>
      <span class="arrow">▲</span>
    </button>
    <div id="settingsBody" class="px-4 pb-3 space-y-3 text-sm hidden">
      <!-- DashScope Key（ASR + LLM 通用） -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <span class="text-gray-400 text-xs">DashScope Key <span class="text-gray-600">(LLM + ASR)</span></span>
          <a href="#" class="reg-link text-blue-400 text-xs hover:underline" data-provider="dashscope">注册指引 →</a>
        </div>
        <div class="flex gap-1">
          <input type="password" id="settingDsKey" class="flex-1 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm" placeholder="sk-xxx" />
          <button class="toggle-pwd text-xs px-1">👁</button>
        </div>
      </div>

      <!-- 百度 Key（ASR + TTS） -->
      <div>
        <span class="text-gray-400 text-xs">百度 AI Key <span class="text-gray-600">(ASR + TTS)</span></span>
        <div class="flex gap-1 mt-1">
          <input type="password" id="settingBdApiKey" class="flex-1 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm" placeholder="API Key" />
          <button class="toggle-pwd text-xs px-1">👁</button>
        </div>
        <div class="flex gap-1 mt-1">
          <input type="password" id="settingBdSecret" class="flex-1 bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm" placeholder="Secret Key" />
          <button class="toggle-pwd text-xs px-1">👁</button>
        </div>
        <a href="#" class="reg-link text-blue-400 text-xs hover:underline mt-0.5 inline-block" data-provider="baidu">注册指引 →</a>
      </div>

      <hr class="border-gray-700/50" />

      <!-- ASR 提供商 -->
      <div class="flex items-center justify-between">
        <span class="text-gray-400 text-xs">ASR 提供商</span>
        <select id="settingAsrProvider" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm">
          <option value="baidu">百度</option>
          <option value="dashscope">DashScope</option>
        </select>
      </div>

      <!-- 模型 -->
      <div class="flex items-center justify-between">
        <span class="text-gray-400 text-xs">模型</span>
        <select id="settingModel" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-white text-sm">
          <option value="qwen-vl-plus">qwen-vl-plus</option>
          <option value="qwen-vl-max">qwen-vl-max</option>
        </select>
      </div>

      <!-- TTS + 帧质量 -->
      <div class="flex items-center justify-between">
        <span class="text-gray-400 text-xs">TTS 语音</span>
        <input type="checkbox" id="settingTTS" class="w-4 h-4 accent-green-500" />
      </div>
      <div class="flex items-center justify-between">
        <span class="text-gray-400 text-xs">帧质量</span>
        <div class="flex items-center gap-2">
          <input type="range" id="settingQuality" min="0.4" max="0.8" step="0.2" class="w-20 h-1 accent-blue-500" />
          <span id="settingQualityLabel" class="text-gray-300 w-10 text-right text-xs">60%</span>
        </div>
      </div>

      <!-- 测试连接 -->
      <button id="testConnection" class="w-full py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs transition-colors">测试连接</button>
      <div id="testResult" class="text-xs text-center"></div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
